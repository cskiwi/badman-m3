<p-select
  [options]="countries()"
  [ngModel]="value()"
  (ngModelChange)="onValueChange($event)"
  optionLabel="name"
  optionValue="code"
  [filter]="true"
  [filterBy]="'name'"
  [placeholder]="'all.competition.edit.info.country.placeholder' | translate"
  [showClear]="true"
  [disabled]="disabled()"
  appendTo="body"
  styleClass="w-full"
/>
