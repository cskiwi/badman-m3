<p-select
      [options]="states()"
      [ngModel]="value()"
      (ngModelChange)="onValueChange($event)"
      optionLabel="name"
      optionValue="code"
      [filter]="true"
      [filterBy]="'name'"
      [placeholder]="'all.competition.edit.info.state.placeholder' | translate"
      [showClear]="true"
      [disabled]="disabled() || states().length === 0"
      appendTo="body"
      styleClass="w-full"
    />
