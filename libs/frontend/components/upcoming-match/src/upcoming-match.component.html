<div class="g-upcoming grid items-center relative overflow-hidden bg-surface-100 border border-surface-200 rounded-xl p-4 px-5">
  <!-- Date column -->
  <div class="g-upcoming__when flex flex-col items-center gap-1 px-3 border-r border-surface-200">
    <span class="g-upcoming__day">{{ match().dayOfWeek }}</span>
    <span class="g-upcoming__date-num">{{ match().dayNumber }}</span>
    <span class="g-upcoming__time">{{ match().time }}</span>
  </div>

  <!-- Match info -->
  <div class="flex flex-col gap-1">
    <div class="flex items-center gap-2">
      <span class="inline-flex items-center h-6 px-2.5 rounded-full text-sm font-semibold bg-primary-100 text-primary-700">
        {{ match().league }}
      </span>
      @if (match().venue) {
        <span class="text-sm text-surface-500">{{ match().venue }}</span>
      }
    </div>
    <div class="g-upcoming__teams">
      {{ match().homeTeam }}
      <span class="text-surface-400 font-medium mx-1.5">vs</span>
      {{ match().awayTeam }}
    </div>
    <span class="g-upcoming__full-date">{{ match().fullDate }}</span>
  </div>

  <!-- Action slot -->
  <ng-content />
</div>
