<div class="p-4 space-y-6">
  <!-- Header -->
  <div class="flex justify-between items-center">
    <h1 class="text-3xl font-bold text-color">{{ 'all.sync.dashboard.title' | translate }}</h1>
  </div>

  <!-- Overview section (always visible) -->
  <app-overview-tab />

  <!-- Tabbed sections -->
  <p-tabs value="0" [lazy]="true">
    <p-tablist>
      <p-tab value="0">{{ 'all.sync.dashboard.tabs.ranking' | translate }}</p-tab>
      <p-tab value="1">{{ 'all.sync.dashboard.tabs.syncPlans' | translate }}</p-tab>
      <p-tab value="2">{{ 'all.sync.dashboard.tabs.cronJobs' | translate }}</p-tab>
    </p-tablist>

    <p-tabpanels>
      <p-tabpanel value="0">
        <app-ranking-tab />
      </p-tabpanel>
      <p-tabpanel value="1">
        <app-sync-plans-tab />
      </p-tabpanel>
      <p-tabpanel value="2">
        <app-cron-jobs-tab />
      </p-tabpanel>
    </p-tabpanels>
  </p-tabs>
</div>
