<section class="g-card">
  <span class="t-eyebrow">Club info</span>

  @if (loading()) {
    <div class="mt-3">
      <span class="t-body-sm text-surface-500">Loading…</span>
    </div>
  } @else if (club(); as c) {
    <div class="flex flex-col gap-3 mt-3">
      @if (c.state) {
        <div class="g-kv">
          <span class="t-eyebrow">Federation</span>
          <span class="g-kv__v">{{ c.state }}</span>
        </div>
      }
      @if (c.clubId) {
        <div class="g-kv">
          <span class="t-eyebrow">Club ID</span>
          <span class="g-kv__v t-mono">#{{ c.clubId }}</span>
        </div>
      }
      <div class="g-kv">
        <span class="t-eyebrow">Season</span>
        <span class="g-kv__v">{{ seasonLabel() }}</span>
      </div>
      @if (c.country) {
        <div class="g-kv">
          <span class="t-eyebrow">Country</span>
          <span class="g-kv__v">{{ c.country }}</span>
        </div>
      }
    </div>
  }
</section>
