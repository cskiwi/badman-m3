<!-- Breadcrumb -->
<nav class="flex items-center gap-2 text-sm text-surface-500 mb-4">
  <a routerLink="/competition" class="text-surface-500 no-underline hover:text-surface-800">
    {{ 'all.navigation.competitions' | translate }}
  </a>
  <i class="pi pi-angle-right text-[10px]"></i>
  <span class="text-surface-800 font-semibold">{{ 'all.competition.team-assembly.title' | translate }}</span>
</nav>

<!-- Header -->
<header class="flex items-end justify-between flex-wrap gap-3 mb-6">
  <div class="flex flex-col gap-2">
    <span class="t-eyebrow">Team builder</span>
    <h1 class="assembly-title m-0">{{ 'all.competition.team-assembly.title' | translate }}</h1>
  </div>
</header>

<!-- Filters -->
<section class="rounded-xl bg-surface-100 border border-surface-200 p-5 mb-6">
  <div class="flex flex-col md:flex-row gap-4 items-start">
    <div class="flex flex-wrap gap-4 flex-1">
      <div class="w-40 shrink-0">
        <p-floatLabel>
          <p-select
            [options]="seasonOptions()"
            [ngModel]="selectedSeason()"
            (ngModelChange)="onSeasonChange($event)"
            optionLabel="label"
            optionValue="value"
            inputId="season-select"
          />
          <label for="season-select">{{ 'all.competition.team-assembly.season' | translate }}</label>
        </p-floatLabel>
      </div>

      <p-floatLabel class="min-w-[180px] flex-1">
        <p-autoComplete
          [suggestions]="clubSuggestions()"
          (completeMethod)="searchClub($event)"
          (onSelect)="onClubSelect($event.value)"
          (onClear)="onClubClear()"
          optionLabel="name"
          [forceSelection]="true"
          [ngModel]="selectedClub()"
          inputId="club-select"
          class="w-full"
        />
        <label for="club-select">{{ 'all.competition.team-assembly.club' | translate }}</label>
      </p-floatLabel>

      <p-floatLabel class="min-w-[180px] flex-1">
        <p-select
          [options]="teams()"
          [ngModel]="selectedTeamId()"
          (ngModelChange)="onTeamChange($event)"
          optionLabel="name"
          optionValue="id"
          [optionGroupLabel]="'type'"
          [optionGroupChildren]="'teams'"
          [group]="true"
          [disabled]="!selectedClub()"
          class="w-full"
          inputId="team-select"
        />
        <label for="team-select">{{ 'all.competition.team-assembly.team' | translate }}</label>
      </p-floatLabel>

      <p-floatLabel class="min-w-[180px] flex-1">
        <p-select
          [options]="encounters()"
          [ngModel]="selectedEncounterId()"
          (ngModelChange)="onEncounterChange($event)"
          optionLabel="label"
          optionValue="id"
          [showClear]="true"
          [disabled]="!selectedTeamId()"
          class="w-full"
          inputId="encounter-select"
        />
        <label for="encounter-select">{{ 'all.competition.team-assembly.encounter' | translate }}</label>
      </p-floatLabel>
    </div>
    <div class="flex gap-1 shrink-0">
      <p-button
        [label]="'all.button.download' | translate"
        icon="pi pi-download"
        size="small"
        [loading]="pdfLoading()"
        [disabled]="pdfLoading()"
        (onClick)="download()"
        severity="secondary"
        [outlined]="true"
      />
      @if (loggedIn()) {
        <p-button icon="pi pi-chevron-down" size="small" [outlined]="true" severity="secondary" (onClick)="saveMenu.toggle($event)" />
        <p-menu #saveMenu [model]="saveMenuItems()" [popup]="true" />
      }
    </div>
  </div>
</section>

<section class="assembly-section">
  <app-assembly [formGroup]="dataService.formGroup" (validationOverview)="templateUpdated($event)" />
</section>

<p-dialog header="There are warnings" [visible]="showValidationDialog()" [modal]="true" [closable]="true" (onHide)="onDialogCancel()">
  @if (validationOverview()?.template) {
    <ng-container *ngTemplateOutlet="validationOverview()!.template" />
  }
  <ng-template pTemplate="footer">
    <p-button [label]="'all.button.agree' | translate" (onClick)="onDialogConfirm()" severity="primary" />
    <p-button [label]="'all.button.cancel' | translate" (onClick)="onDialogCancel()" severity="secondary" [outlined]="true" />
  </ng-template>
</p-dialog>

<p-toast />
