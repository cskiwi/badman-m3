@if (!loading()) {
@if (this.player(); as player) {
<!-- Breadcrumb -->
<app-breadcrumb [items]="[
  { label: player.fullName },
]" />

<!-- Hero -->
<app-hero>
  <!-- Avatar -->
  <app-hero-avatar avatar>{{ playerInitials() }}</app-hero-avatar>

  <!-- Identity -->
  <div identity>
    <app-hero-title>{{ player.fullName }}</app-hero-title>
    <div class="flex items-center gap-3 flex-wrap">
      @if (this.club(); as club) {
      <a class="flex items-center gap-2 text-muted-color no-underline" [routerLink]="['/', 'clubs', club.slug]">
        <i class="pi pi-shield text-primary"></i>
        <strong class="text-color font-semibold">{{ club.name }}</strong>
      </a>
      }
      @if (player.memberId) {
      <span class="t-mono text-xs text-muted-color bg-emphasis px-2 py-0.5 rounded-sm tracking-wider">
        #{{ player.memberId }}
      </span>
      }
    </div>
  </div>

  <!-- Actions -->
  <div actions class="flex items-center gap-2">
    <p-button icon="pi pi-user-plus" [outlined]="true" label="Follow" size="small" (onClick)="toggleFollow()" />
    <p-button icon="pi pi-users" [routerLink]="['head-to-head']" [label]="'all.head-to-head.title' | translate" size="small" />
    <p-menu #menu [model]="editMenuItems" [popup]="true" />
    <p-button icon="pi pi-ellipsis-v" [outlined]="true" (click)="menu.toggle($event)" size="small" />
  </div>

  <!-- Rank panel -->
  <div stats class="mt-5 pt-5 border-t border-surface relative z-[1]">
    <app-player-ranking-progress [playerId]="player.id" />
  </div>
</app-hero>

<!-- Main grid: left content + right sidebar -->
<div class="grid grid-cols-1 lg:grid-cols-[1fr_300px] gap-5 items-start">
  <!-- Left column -->
  <div class="flex flex-col gap-6">
    <!-- Upcoming -->
    <section>
      <app-upcoming-games [for]="player.id" [type]="'player'" />
    </section>

    <!-- Recent matches -->
    <section>
      <app-recent-games [for]="player.id" [type]="'player'" />
    </section>
  </div>

  <!-- Right sidebar -->
  <aside class="flex flex-col gap-5">
    <app-player-current-form [playerId]="player.id" />
    <app-player-season-record [playerId]="player.id" />
    <app-player-strongest-matchups [playerId]="player.id" />
    <app-player-teams [playerId]="player.id" />
  </aside>
</div>
}
} @else {
<div class="p-4">
  <p-progressBar mode="indeterminate" [style]="{ height: '6px' }" />
</div>
}

@if (error()) {
<div class="flex items-center justify-center p-8 text-red-600">
  <i class="pi pi-exclamation-triangle mr-2"></i>
  <span>{{ error() }}</span>
</div>
}
